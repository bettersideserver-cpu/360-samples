<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>360-Samples</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.124.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/panolens@0.12.0/build/panolens.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap');

        html,
        body {
            margin: 0;
            height: 100%;
            overflow: hidden;
        }

        #fadeOverlay {
            position: fixed;
            inset: 0;
            background: #000;
            opacity: 0;
            pointer-events: none;
            transition: opacity .5s ease;
            z-index: 9999;
        }

        #viewer {
            width: 100%;
            height: 100%;
        }

        /* ── Tour Nav (pill bar) ── */
        .tour-nav {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);

            display: flex;
            align-items: center;
            gap: 6px;

            padding: 6px;

            background: rgba(70, 70, 70, .35);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);

            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 18px;

            z-index: 10000;
        }

        .tour-pill {
            display: flex;
            align-items: center;
            gap: 6px;

            height: 34px;
            padding: 0 12px;

            background: #2b2b2b;
            color: #fff;

            border: none;
            border-radius: 10px;

            font-family: 'Jost', sans-serif;
            font-size: 12px;
            font-weight: 500;

            cursor: pointer;
            white-space: nowrap;
            transition: .25s;
        }

        .tour-pill svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            display: block;
        }

        .tour-pill:hover {
            background: #353535;
            transform: translateY(-1px);
        }

        .tour-pill.active {
            background: #111;
        }

        /* ── Back Button ── */
        #backBtn {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 10000;
            border: none;
            border-radius: 12px;
            width: 38px;
            height: 38px;
            padding: 0;
            background: rgba(0, 0, 0, .55);
            color: white;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #backBtn:hover {
            background: white;
            color: black;
        }

        #roomInfoCard {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;

            font-family: 'Jost', sans-serif;
            text-align: right;

            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            padding: 14px 18px;

            opacity: 0;
            transform: translateY(-8px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            pointer-events: none;
        }

        #roomInfoCard.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        #roomInfoCard .hud-name {
            font-size: 30px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.02em;
            margin-bottom: 8px;
        }

        #roomInfoCard .hud-dims {
            font-size: 20px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.80);
            letter-spacing: 0.04em;
            margin-bottom: 4px;
        }

        #roomInfoCard .hud-sqft {
            font-size: 18px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.60);
            letter-spacing: 0.04em;
        }

        #roomInfoCard .hud-accent {
            color: #ffffff;
        }


        /* ── Floor Pill (vertical: ▲ · Floor 01 · ▼) ── */
        #balconyControls {
            position: fixed;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            z-index: 10001;
            display: none;
            flex-direction: column;
            align-items: center;
            background: rgba(15, 15, 15, 0.72);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 20px;
            padding: 6px;
            gap: 0;
            overflow: hidden;
        }

        #balconyControls .floor-btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 14px;
            background: transparent;
            color: rgba(255, 255, 255, 0.75);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .2s, color .2s;
            flex-shrink: 0;
        }

        #balconyControls .floor-btn:hover {
            background: rgba(255, 255, 255, 0.13);
            color: #fff;
        }

        #balconyControls .floor-btn svg {
            width: 16px;
            height: 16px;
            display: block;
        }

        #floorIndicator {
            font-family: 'Jost', sans-serif;
            font-size: 10px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.08em;
            text-align: center;
            padding: 10px 0;
            width: 44px;
            border-top: 1px solid rgba(255, 255, 255, 0.09);
            border-bottom: 1px solid rgba(255, 255, 255, 0.09);
            display: block;
            line-height: 1.5;
            text-transform: uppercase;
        }

        /* ── Desktop: keep nav centered ── */
        @media (min-width: 769px) {
            .tour-nav-wrap {
                position: fixed !important;
                bottom: 12px !important;
                left: 50% !important;
                right: auto !important;
                transform: translateX(-50%) !important;
                width: auto !important;
                z-index: 10000 !important;
            }

            .scroll-arrow {
                display: none !important;
            }

            .tour-nav-wrap .tour-nav {
                position: static !important;
                transform: none !important;
                left: auto !important;
                right: auto !important;
                bottom: auto !important;
            }
        }

        /* ── Scroll Arrow Hint ── */
        .tour-nav-wrap {
            position: fixed;
            bottom: 10px;
            left: 8px;
            right: 8px;
            z-index: 10000;
            display: flex;
            align-items: center;
        }

        .tour-nav-wrap .tour-nav {
            position: static;
            transform: none;
            flex: 1;
            min-width: 0;
        }

        .scroll-arrow {
            display: none;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 34px;
            flex-shrink: 0;
            margin-left: 4px;
            background: rgba(70, 70, 70, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .scroll-arrow svg {
            width: 14px;
            height: 14px;
            color: white;
            opacity: 0.85;
        }

        .scroll-arrow.hidden {
            opacity: 0;
        }

        /* ── Mobile Responsive ── */
        @media (max-width: 768px) {
            .tour-nav {
                bottom: 10px;
                left: 8px;
                right: 8px;
                transform: none;
                overflow-x: auto;
                overflow-y: hidden;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
                flex-wrap: nowrap;
                padding: 6px 8px;
                border-radius: 14px;
                gap: 6px;
                max-width: calc(100vw - 16px);
            }

            .tour-nav::-webkit-scrollbar {
                display: none;
            }

            .tour-pill {
                height: 40px;
                padding: 0 14px;
                font-size: 13px;
                border-radius: 10px;
                flex-shrink: 0;
            }

            .tour-pill svg {
                width: 16px;
                height: 16px;
            }

            .scroll-arrow {
                display: flex;
            }

            #roomInfoCard {
                top: 16px;
                right: 10px;
                left: auto;
                padding: 10px 14px;
                border-radius: 12px;
                max-width: calc(100vw - 100px);
            }

            #roomInfoCard .hud-name {
                font-size: 18px;
                margin-bottom: 4px;
            }

            #roomInfoCard .hud-dims {
                font-size: 13px;
                margin-bottom: 2px;
            }

            #roomInfoCard .hud-sqft {
                font-size: 12px;
            }

            /* Back button — small on mobile */

            /* Floor controls — move to left center on mobile */
            #balconyControls {
                right: auto;
                left: 12px;
                top: 50%;
                transform: translateY(-50%);
            }

            #backBtn {
                width: 34px !important;
                height: 34px !important;
                font-size: 16px !important;
                top: 12px !important;
                left: 12px !important;
                padding: 0 !important;
                border-radius: 10px !important;
                background: #2c2c2c !important;
                backdrop-filter: none !important;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
                line-height: 1 !important;
            }
        }

        @media (max-width: 400px) {
            .tour-pill {
                height: 38px;
                padding: 0 12px;
                font-size: 12px;
            }
        }
        #logo{
    position: fixed;
    top: 16px;
    left: 16px;

    z-index: 10001;

    width: 250px;

    display: flex;
    align-items: center;
    justify-content: center;

    pointer-events: none; /* remove if you want logo clickable */
}

#logo img{
    width:100%;
    height:auto;
    display:block;

    filter: drop-shadow(0 4px 10px rgba(0,0,0,.35));
}
@media (max-width:768px){

    #logo{
        top:12px;
        left:54px;   /* keeps it clear of your back button */
        width:90px;
    }

}
    </style>
</head>

<body>


    <div id="logo">
    <img src="images/Betterside Logo 1.png" alt="Logo">
</div>
    <!-- Floor Pill -->
    <div id="balconyControls">
        <button class="floor-btn" id="floorUpBtn" title="Floor Up">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 15L12 9L18 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
        </button>
        <div id="floorIndicator">FL<br>01</div>
        <button class="floor-btn" id="floorDownBtn" title="Floor Down">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
        </button>
    </div>

    <script> const selectedFloor =
            sessionStorage.getItem("selectedFloor") || "01";

        const balconyType =
            sessionStorage.getItem("balconyType") || "LeftCorner";
    </script>




    <div id="viewer"></div>

    <!-- Bottom panel with room navigation pills -->
    <div class="tour-nav-wrap" id="tourNavWrap">
        <div class="tour-nav" id="tourNav">

            <button class="tour-pill active" onclick="goToRoom('Lobby', this)">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M4 10L12 4L20 10V20H4V10Z" stroke="currentColor" stroke-width="1.8"
                        stroke-linejoin="round" />
                </svg>
                <span>Sample 1</span>
            </button>


            <button class="tour-pill" onclick="goToRoom('Kitchen', this)">
                <svg viewBox="0 0 24 24" fill="none">
                    <rect x="5" y="5" width="14" height="14" stroke="currentColor" stroke-width="1.8" />
                    <path d="M8 9H16" stroke="currentColor" stroke-width="1.8" />
                </svg>
                <span>Sample 2</span>
            </button>

            <button class="tour-pill" onclick="goToRoom('Bedroom_1', this)">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M3 12V8H21V12" stroke="currentColor" stroke-width="1.8" />
                    <path d="M3 12H21V20H3V12Z" stroke="currentColor" stroke-width="1.8" />
                </svg>
                <span>Sample 3</span>
            </button>

            <button class="tour-pill" onclick="goToRoom('Bedroom_2', this)">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M3 12V8H21V12" stroke="currentColor" stroke-width="1.8" />
                    <path d="M3 12H21V20H3V12Z" stroke="currentColor" stroke-width="1.8" />
                </svg>
                <span>Sample 4</span>
            </button>

            <button class="tour-pill" onclick="goToRoom('Bathroom', this)">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M3 12V8H21V12" stroke="currentColor" stroke-width="1.8" />
                    <path d="M3 12H21V20H3V12Z" stroke="currentColor" stroke-width="1.8" />
                </svg>
                <span>Sample 5</span>
            </button>




            <button class="tour-pill" onclick="goToRoom('Tennis', this)">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M3 12V8H21V12" stroke="currentColor" stroke-width="1.8" />
                    <path d="M3 12H21V20H3V12Z" stroke="currentColor" stroke-width="1.8" />
                </svg>
                <span>Sample 6</span>
            </button>



          

        </div>
        <div class="scroll-arrow" id="scrollArrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="9 6 15 12 9 18" />
            </svg>
        </div>
    </div>

    <script>
        function createArrowSVG() {

            const selectedFloor =
                sessionStorage.getItem("selectedFloor") || "01";

            const balconyType =
                sessionStorage.getItem("balconyType") || "LeftCorner";
            const svg = `
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
    <defs>
      <radialGradient id="glassFill" cx="50%" cy="40%" r="60%">
        <stop offset="0%"  stop-color="rgba(255,255,255,0.28)"/>
        <stop offset="55%" stop-color="rgba(255,255,255,0.10)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
      </radialGradient>
      <linearGradient id="glassHighlight" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%"  stop-color="rgba(255,255,255,0.35)"/>
        <stop offset="45%" stop-color="rgba(255,255,255,0)"/>
      </linearGradient>
      <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
        <feOffset dx="0" dy="2" result="offsetblur"/>
        <feComponentTransfer>
          <feFuncA type="linear" slope="0.45"/>
        </feComponentTransfer>
        <feMerge>
          <feMergeNode/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      <radialGradient id="dotFill" cx="50%" cy="45%" r="50%">
        <stop offset="0%"  stop-color="#123a8a"/>
        <stop offset="100%" stop-color="#0A1F44"/>
      </radialGradient>
    </defs>
    <g filter="url(#softShadow)">
      <circle cx="64" cy="64" r="44"
              fill="url(#glassFill)"
              stroke="rgba(255,255,255,0.22)"
              stroke-width="1.2"/>
      <circle cx="64" cy="64" r="44"
              fill="url(#glassHighlight)"
              opacity="0.9"/>
      <circle cx="64" cy="64" r="38"
              fill="none"
              stroke="rgba(255,255,255,0.08)"
              stroke-width="1"/>
    </g>
    <circle cx="64" cy="64" r="6.5" fill="url(#dotFill)"/>
    <circle cx="64" cy="64" r="14" fill="#3b3b3b"/>
  </svg>`;

            return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
        }


        console.log("Selected Floor =", selectedFloor);


        const ARROW_ICON = createArrowSVG();

        const viewer = new PANOLENS.Viewer({
            container: document.getElementById("viewer"),
            controlBar: false
        });
        viewer.camera.fov = 100;
        viewer.camera.updateProjectionMatrix();

        const roomFiles = {
            Bedroom_1: "Lobby",
            Kitchen: "Kitchen",
            Bathroom: "Bathroom",
            Lobby: "Bedroom",
            Bedroom_2: "Bedroom-2",
            Pool:  "Pool",
              Tennis:  "Tennis"
        };

        const rooms = {};

        for (const room in roomFiles) {

            rooms[room] = {
                low: new PANOLENS.ImagePanorama(`images/WEBP/${roomFiles[room]}.webp`),
                high: new PANOLENS.ImagePanorama(`images/${roomFiles[room]}.webp`),
                loaded: false,
                loading: false
            };

        }



        const img = new Image();

        img.onload = () => console.log("JPG works");
        img.onerror = () => console.log("JPG failed");

        img.src = "images/Lobby.webp";


       


        Object.values(rooms).forEach(room => {

            if (room.low) {

                viewer.add(room.low);
                viewer.add(room.high);

                room.low.fadeDuration = 1200;
                room.high.fadeDuration = 1200;

                room.high.addEventListener("load", () => {
                    room.loaded = true;
                });

            } else {

                // Balcony
                viewer.add(room);
                room.fadeDuration = 1200;

            }

        });

        // ── Floor indicator ──
        function updateFloorIndicator() {
            document.getElementById("floorIndicator").innerHTML =
                `FL<br>${String(currentBalconyFloor).padStart(2, '0')}`;
        }

        // ── Show/hide floor pill ──
        function updateBalconyControls(roomName) {
            const controls = document.getElementById("balconyControls");
            if (roomName === "balcony") {
                controls.style.display = "flex";
                updateFloorIndicator();
            } else {
                controls.style.display = "none";
            }
        }

        // ── Change floor ──
        function changeBalconyFloor(direction) {
            const next = currentBalconyFloor + direction;
            if (next < 1 || next > 6) return;
            currentBalconyFloor = next;
            updateFloorIndicator();
            const panorama = createBalconyPanorama(currentBalconyFloor);
            viewer.add(panorama);
            panorama.fadeDuration = 1200;

            // Re-add back hotspot
            const spot = new PANOLENS.Infospot(500, ARROW_ICON);
            const r = 5000;
            const yaw = -150;
            const pitch = -6;
            const phi = THREE.MathUtils.degToRad(90 - pitch);
            const theta = THREE.MathUtils.degToRad(yaw);
            spot.position.set(
                r * Math.sin(phi) * Math.cos(theta),
                r * Math.cos(phi),
                r * Math.sin(phi) * Math.sin(theta)
            );
            spot.addHoverText("Lobby");
            spot.addEventListener("click", () => {
                viewer.setPanorama(rooms["Lobby"]);
                updateBalconyControls("Lobby");
            });
            panorama.add(spot);

            rooms.balcony = panorama;
            viewer.setPanorama(panorama);
        }

        document.getElementById("floorUpBtn").addEventListener("click", () => changeBalconyFloor(1));
        document.getElementById("floorDownBtn").addEventListener("click", () => changeBalconyFloor(-1));


        function lookAtYaw(yaw, pitch = 0) {
            const r = 5000;
            const phi = THREE.MathUtils.degToRad(90 - pitch);
            const theta = THREE.MathUtils.degToRad(yaw);
            viewer.tweenControlCenter(
                new THREE.Vector3(
                    r * Math.sin(phi) * Math.cos(theta),
                    r * Math.cos(phi),
                    r * Math.sin(phi) * Math.sin(theta)
                )
            );
        }



        const roomData = {
            Lobby: { name: "Lobby", L: 14.4, W: 11.10 },
            Dinning: { name: "Dining Room", L: 12, W: 10 },
            Kitchen: { name: "Kitchen", L: 11.1, W: 8.6 },
            Room_1: { name: "Master Bedroom", L: 15.7, W: 12 },
            Room_2: { name: "Kid's Room", L: 14, W: 10.7 },
            Room_3: { name: "Guest's Room", L: 17, W: 12 },
            Garden_1: { name: "Garden", L: 0, W: 0 },
            Garden_2: { name: "Back Garden", L: 0, W: 0 },
            Garden_Sitting: { name: "Sitout", L: 0, W: 0 },
        };

        function showInfoCard(roomKey) {
            const data = roomData[roomKey];
            const card = document.getElementById("roomInfoCard");
            if (!data) { card.classList.remove("visible"); return; }
            const sqft = (data.L * data.W).toFixed(2);
            document.getElementById("cardName").textContent = data.name;
            document.getElementById("cardLength").textContent = data.L;
            document.getElementById("cardWidth").textContent = data.W;
            document.getElementById("cardSqft").textContent = sqft;
            card.classList.remove("visible");
            setTimeout(() => card.classList.add("visible"), 80);
        }

        function goToRoom(roomName, btn) {
            // Update active pill
            document.querySelectorAll('.tour-pill').forEach(p => p.classList.remove('active'));
            if (btn) btn.classList.add('active');

            const overlay = document.getElementById("fadeOverlay");
            overlay.style.opacity = 0.25;
            setTimeout(() => {
                if (roomName === "balcony") {

                    viewer.setPanorama(rooms.balcony);

                } else {

                    const room = rooms[roomName];

                    // Show low-quality image first
                    viewer.setPanorama(room.low);

                    // If high image already loaded
                    if (room.loaded) {

                        viewer.setPanorama(room.high);

                    } else if (!room.loading) {

                        room.loading = true;

                        const img = new Image();

                        img.onload = () => {

                            room.loaded = true;

                            if (viewer.panorama === room.low) {
                                viewer.setPanorama(room.high);
                            }

                        };

                        img.src = `images/${roomFiles[roomName]}.webp`;

                    }

                }
                viewer.camera.fov = 100;
                viewer.camera.updateProjectionMatrix();
                overlay.style.opacity = 0;
                updateBalconyControls(roomName);
                showInfoCard(roomName);
            }, 300);
        }

        // Hotspots
        // addHotspot("Current Room", "Destination", X, Y, "NAME");

        viewer.setPanorama(rooms.Lobby.low);

        rooms.Lobby.loading = true;

        const lobbyImg = new Image();

        lobbyImg.onload = () => {
            rooms.Lobby.loaded = true;

            if (viewer.panorama === rooms.Lobby.low) {
                viewer.setPanorama(rooms.Lobby.high);
            }
        };

        lobbyImg.src = "images/Lobby.webp";


        showInfoCard("Lobby");
        updateBalconyControls("Lobby");

        document.getElementById("backBtn").addEventListener("click", () => {
            window.history.back();
        });

        // Scroll arrow hint
        const tourNav = document.getElementById('tourNav');
        const scrollArrow = document.getElementById('scrollArrow');
        if (tourNav && scrollArrow) {
            function updateScrollArrow() {
                const atEnd = tourNav.scrollLeft + tourNav.clientWidth >= tourNav.scrollWidth - 4;
                scrollArrow.classList.toggle('hidden', atEnd);
            }
            tourNav.addEventListener('scroll', updateScrollArrow);
            window.addEventListener('resize', updateScrollArrow);
            updateScrollArrow();
        }

    </script>

    <div id="fadeOverlay"></div>

</body>

</html>
